<!-- Reusable card component for events, partners, achievements -->
<div class="goal-card-outer">
    <div class="goal-card-inner">
        <div class="goal-card-icon-container">
            {{ICON}}
        </div>
        <h3 class="goal-card-title">{{TITLE}}</h3>
        <p class="goal-card-desc">{{DESC}}</p>
        <div class="goal-card-button-container">
            <button class="goal-card-more-btn">more</button>
        </div>
    </div>
</div>

<section class="event-detail-shell">
  <button class="event-detail-back" type="button" data-event-back>
    <span class="event-detail-back-icon" aria-hidden="true"></span>
    <span>Back to Events</span>
  </button>

  <article class="event-detail-hero">
    <div class="event-detail-hero-image">
      <div class="img-wrap">
        <img data-event-hero-image alt="" />
      </div>
    </div>
    <span class="event-detail-kicker" data-event-category></span>
    <h1 data-event-title></h1>
    <p class="event-detail-subtitle" data-event-subtitle></p>
    <p class="event-detail-quote" data-event-quote></p>
  </article>

  <section class="event-detail-summary">
    <div class="event-detail-summary-box">
      <div class="event-detail-summary-inner" aria-hidden="true"></div>
    </div>
    <p class="event-detail-summary-text" data-event-summary></p>
  </section>

  <section class="event-detail-meta" aria-label="Event details">
    <article class="event-detail-meta-card" data-meta-card="time">
      <div class="event-detail-meta-icon" data-meta-icon="time"></div>
      <strong data-event-time></strong>
    </article>
    <article class="event-detail-meta-card" data-meta-card="date">
      <div class="event-detail-meta-icon" data-meta-icon="date"></div>
      <strong data-event-date></strong>
    </article>
    <article class="event-detail-meta-card" data-meta-card="location">
      <div class="event-detail-meta-icon" data-meta-icon="location"></div>
      <strong data-event-location></strong>
    </article>
  </section>

  <section class="event-detail-insights" aria-label="Event insights">
    <article class="event-detail-insight-card" data-insight-card="left">
      <div class="event-detail-insight-icon" data-insight-icon="left"></div>
      <h2 data-insight-title="left"></h2>
      <ul class="event-detail-insight-list" data-insight-list="left"></ul>
    </article>
    <article class="event-detail-insight-card" data-insight-card="center">
      <div class="event-detail-insight-icon" data-insight-icon="center"></div>
      <h2 data-insight-title="center"></h2>
      <ul class="event-detail-insight-list" data-insight-list="center"></ul>
    </article>
    <article class="event-detail-insight-card" data-insight-card="right">
      <div class="event-detail-insight-icon" data-insight-icon="right"></div>
      <h2 data-insight-title="right"></h2>
      <ul class="event-detail-insight-list" data-insight-list="right"></ul>
    </article>
  </section>

  <section class="event-detail-gallery-section" data-gallery-section>
    <div class="event-detail-gallery-border">
      <div class="event-detail-gallery" data-event-gallery></div>
    </div>
  </section>

  <section class="event-detail-related-section" data-related-section>
    <div class="event-detail-section-heading">
      <h2>More Events</h2>
    </div>
    <div class="event-detail-related-grid" data-event-related></div>
  </section>
</section>
